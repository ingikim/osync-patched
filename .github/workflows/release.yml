name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This repo is a release mirror of the plugin built in the private Osync
      # monorepo. It does NOT rebuild from src here — rebuilding from a stale mirror
      # once shipped an outdated main.js that overwrote the correct release assets.
      # Instead we publish the committed, pre-built artifacts and fail loudly if they
      # don't match the tag, so a mismatched mirror is caught instead of shipped.
      - name: Verify committed artifacts match the tag
        run: |
          set -e
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag (${GITHUB_REF_NAME}). Sync the plugin build before tagging."
            exit 1
          fi
          for f in main.js manifest.json styles.css; do
            if [ ! -f "$f" ]; then
              echo "::error::missing committed artifact: $f"
              exit 1
            fi
          done
          echo "Artifacts verified for ${GITHUB_REF_NAME}."

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
