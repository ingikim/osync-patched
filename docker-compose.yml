services:
  api:
    image: thomasjeong/osync:latest
    container_name: osync-api
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-osync}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-osync}
      S3_ENDPOINT: http://minio:9000
      COORDINATOR_DATA_DIR: /data/coordinators
    volumes:
      - coordinator_data:/data/coordinators
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-osync}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osync}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  coordinator_data:
